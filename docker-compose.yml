services:

  backend:
    build:
      context: ./operation_data
      dockerfile: Dockerfile
    container_name: symfony_backend
    volumes:
      - ./operation_data:/var/www/html
    environment:
      APP_ENV: dev

  backend_nginx:
    image: nginx:alpine
    container_name: symfony_nginx
    ports:
      - "8080:80"
    volumes:
      - ./operation_data:/var/www/html
      - ./operation_data/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    working_dir: /app
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    stdin_open: true
    tty: true

volumes:
  frontend_node_modules: