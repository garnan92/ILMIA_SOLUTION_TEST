nelmio_cors:
    defaults:
        allow_credentials: false
        allow_origin:
            - 'http://localhost:5174'
            - 'http://127.0.0.1:5174'
        allow_headers:
            - 'Content-Type'
            - 'Authorization'
        allow_methods:
            - 'GET'
            - 'POST'
            - 'OPTIONS'
        max_age: 3600

    paths:
        '^/':
            allow_origin:
                - 'http://localhost:5174'
                - 'http://127.0.0.1:5174'
            allow_headers:
                - 'Content-Type'
                - 'Authorization'
            allow_methods:
                - 'GET'
                - 'POST'
                - 'OPTIONS'
            max_age: 3600
